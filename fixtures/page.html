<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>每日复盘总结</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #606060;
      --line: #d8d8d8;
      --btn: #2c2c2c;
      --btn-text: #f0f0f0;
      --entry-green: #dff1dd;
      --entry-green-border: #bcdcb8;
      --selected: #2c2c2c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(160deg, #fbfbfb 0%, #ececec 100%);
      color: var(--text);
      font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .card {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
    }
    h1 { margin: 0 0 14px; font-size: 24px; }
    .section { margin-bottom: 16px; }
    .section h2 { margin: 0 0 10px; font-size: 16px; }
    .field-label { display: grid; gap: 8px; margin-bottom: 12px; }
    input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    .calendar {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fbfbfb;
    }
    .calendar-toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .month-btn {
      border: 1px solid #d0d0d0;
      background: #f6f6f6;
      color: #2c2c2c;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      padding: 0;
      line-height: 1;
    }
    .calendar-title {
      text-align: center;
      font-size: 14px;
      color: #3c3c3c;
    }
    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 30px);
      gap: 4px;
      width: fit-content;
    }
    .calendar-weekdays {
      margin-bottom: 6px;
      font-size: 12px;
      color: #7a7a7a;
      text-align: center;
    }
    .calendar-day {
      width: 30px;
      height: 30px;
      border: 1px solid #d8d8d8;
      border-radius: 6px;
      background: #fff;
      color: #3a3a3a;
      padding: 0;
      font-size: 11px;
    }
    .calendar-day:hover {
      border-color: #a8a8a8;
    }
    .calendar-day.future {
      opacity: 0.38;
      cursor: default;
    }
    .calendar-day.future:hover {
      border-color: #d8d8d8;
    }
    .calendar-day.has-entry {
      background: var(--entry-green);
      border-color: var(--entry-green-border);
    }
    .calendar-day.selected {
      background: var(--selected);
      color: #fff;
      border-color: var(--selected);
    }
    .calendar-day.empty {
      visibility: hidden;
      pointer-events: none;
    }
    .selected-date {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
    }
    .plan-list { display: grid; gap: 8px; }
    .plan-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed #d6d6d6;
    }
    .plan-row:last-child { border-bottom: 0; }
    .plan-done { width: 18px; height: 18px; }
    .plan-text {
      border: 0 !important;
      border-radius: 0 !important;
      border-bottom: 1px solid #cfcfcf !important;
      padding: 8px 2px !important;
      background: transparent !important;
    }
    .plan-text:focus {
      outline: none;
      border-bottom-color: #8f8f8f !important;
    }
    .plan-actions { margin-top: 10px; }
    .plan-add {
      background: #ececec;
      color: #2c2c2c;
      border: 1px solid #d0d0d0;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .plan-del {
      background: transparent;
      color: #666;
      border: 1px solid #d7d7d7;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    textarea { resize: vertical; }
    textarea.auto-grow {
      overflow: hidden;
      min-height: 96px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    button {
      border: 0;
      border-radius: 10px;
      background: var(--btn);
      color: var(--btn-text);
      padding: 12px 18px;
      font: inherit;
      cursor: pointer;
    }
    #status { margin-top: 12px; color: var(--muted); white-space: pre-wrap; }
  </style>
</head>
<body>
  <main class="card">
    <h1>每日复盘总结</h1>
    <form id="daily-form">
      <section class="section">
        <h2>🗓️ 日期</h2>
        <input type="hidden" name="date" value="__TODAY__" required>
        <div class="calendar">
          <div class="calendar-toolbar">
            <button type="button" class="month-btn" id="month-prev" aria-label="上个月">‹</button>
            <div class="calendar-title" id="calendar-title"></div>
            <button type="button" class="month-btn" id="month-next" aria-label="下个月">›</button>
          </div>
          <div class="calendar-weekdays">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
        <div class="selected-date">已选日期：<span id="selected-date">__TODAY__</span></div>
      </section>

      <section class="section">
        <h2>🎯 今日计划完成情况</h2>
        <div class="plan-list" id="plan-list">__PLAN_ROWS__</div>
        <div class="plan-actions">
          <button type="button" class="plan-add" id="plan-add">+ 新增计划</button>
        </div>
      </section>

      <section class="section">
        <h2>🏃 运动</h2>
        <textarea class="auto-grow" name="exercise" rows="4" required></textarea>
      </section>

      <section class="section">
        <h2>🤔 总结</h2>
        __PROMPTS_HTML__
      </section>

      <button type="submit">提交</button>
      <div id="status"></div>
    </form>
  </main>

  <script>
    const READ_ONLY = __READ_ONLY__;
    const form = document.getElementById('daily-form');
    const statusEl = document.getElementById('status');
    const planList = document.getElementById('plan-list');
    const planAdd = document.getElementById('plan-add');
    const selectedDateEl = document.getElementById('selected-date');
    const calendarGrid = document.getElementById('calendar-grid');
    const calendarTitle = document.getElementById('calendar-title');
    const prevMonthBtn = document.getElementById('month-prev');
    const nextMonthBtn = document.getElementById('month-next');
    const dateInput = form.querySelector('input[name="date"]');
    const token = new URLSearchParams(window.location.search).get('token') || '';
    const textareas = [...document.querySelectorAll('textarea')];

    let selectedDate = dateInput.value;
    let monthCursor = parseDate(selectedDate);
    monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth(), 1);
    let recordedDates = new Set();

    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = `${el.scrollHeight}px`;
    }

    textareas.forEach((el) => {
      el.classList.add('auto-grow');
      autoGrow(el);
      el.addEventListener('input', () => autoGrow(el));
    });

    function parseDate(dateText) {
      const [year, month, day] = dateText.split('-').map((v) => Number(v));
      return new Date(year, month - 1, day);
    }

    function formatDate(d) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function createPlanRow(text = '', done = false) {
      const row = document.createElement('div');
      row.className = 'plan-row';

      const doneInput = document.createElement('input');
      doneInput.className = 'plan-done';
      doneInput.type = 'checkbox';
      doneInput.setAttribute('aria-label', 'done-new');
      doneInput.checked = done;
      if (READ_ONLY) doneInput.disabled = true;

      const textInput = document.createElement('input');
      textInput.className = 'plan-text';
      textInput.type = 'text';
      textInput.required = true;
      textInput.value = text;
      if (READ_ONLY) textInput.readOnly = true;

      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'plan-del';
      delBtn.setAttribute('aria-label', '删除计划');
      delBtn.textContent = '删除';
      if (READ_ONLY) {
        delBtn.disabled = true;
        delBtn.hidden = true;
      }

      row.appendChild(doneInput);
      row.appendChild(textInput);
      row.appendChild(delBtn);
      return row;
    }

    function bindDeleteButtons() {
      if (READ_ONLY) return;
      const buttons = [...planList.querySelectorAll('.plan-del')];
      buttons.forEach((btn) => {
        if (btn.dataset.bound === '1') return;
        btn.dataset.bound = '1';
        btn.addEventListener('click', () => {
          const rows = [...planList.querySelectorAll('.plan-row')];
          if (rows.length <= 1) {
            statusEl.textContent = '至少保留一个计划。';
            return;
          }
          btn.closest('.plan-row').remove();
        });
      });
    }

    function setPlans(plans) {
      planList.innerHTML = '';
      plans.forEach((item) => {
        planList.appendChild(createPlanRow(item.text || '', Boolean(item.done)));
      });
      if (plans.length === 0) {
        planList.appendChild(createPlanRow('', false));
      }
      bindDeleteButtons();
    }

    function setPrompts(prompts) {
      const promptEls = [...form.querySelectorAll('textarea[name^="prompt_"]')];
      promptEls.forEach((el, idx) => {
        el.value = prompts[idx] || '';
        autoGrow(el);
      });
    }

    function clearEntryFields() {
      setPlans([]);
      form.querySelector('textarea[name="exercise"]').value = '';
      setPrompts(['', '', '']);
      autoGrow(form.querySelector('textarea[name="exercise"]'));
    }

    function renderCalendar() {
      calendarTitle.textContent = `${monthCursor.getFullYear()}年${String(monthCursor.getMonth() + 1).padStart(2, '0')}月`;
      calendarGrid.innerHTML = '';

      const firstDay = new Date(monthCursor.getFullYear(), monthCursor.getMonth(), 1);
      const lastDay = new Date(monthCursor.getFullYear(), monthCursor.getMonth() + 1, 0);
      const lead = firstDay.getDay();

      for (let i = 0; i < lead; i += 1) {
        const empty = document.createElement('button');
        empty.type = 'button';
        empty.className = 'calendar-day empty';
        empty.disabled = true;
        calendarGrid.appendChild(empty);
      }

      for (let day = 1; day <= lastDay.getDate(); day += 1) {
        const cellDate = new Date(monthCursor.getFullYear(), monthCursor.getMonth(), day);
        const dateText = formatDate(cellDate);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const isFutureDate = cellDate.getTime() > today.getTime();
        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = 'calendar-day';
        cell.textContent = String(day);

        if (recordedDates.has(dateText)) {
          cell.classList.add('has-entry');
          cell.title = '已有记录';
        }
        if (dateText === selectedDate) {
          cell.classList.add('selected');
        }
        if (isFutureDate) {
          cell.classList.add('future');
          cell.disabled = true;
          cell.title = '未来日期不可选择';
          calendarGrid.appendChild(cell);
          continue;
        }

        cell.addEventListener('click', async () => {
          selectedDate = dateText;
          dateInput.value = dateText;
          selectedDateEl.textContent = dateText;
          renderCalendar();
          await loadEntryForDate(dateText);
        });

        calendarGrid.appendChild(cell);
      }
    }

    async function fetchRecordedDates() {
      const url = `/api/dates?token=${encodeURIComponent(token)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || '读取日期列表失败');
      }
      recordedDates = new Set(Array.isArray(data.dates) ? data.dates : []);
    }

    async function loadEntryForDate(dateText) {
      if (!recordedDates.has(dateText)) {
        clearEntryFields();
        statusEl.textContent = READ_ONLY
          ? '该日期暂无记录。'
          : '该日期暂无记录，可直接填写并提交。';
        return;
      }

      statusEl.textContent = '正在加载该日期记录...';
      const url = `/api/entry?token=${encodeURIComponent(token)}&date=${encodeURIComponent(dateText)}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || '读取记录失败');
      }

      const entry = data.entry || {};
      setPlans(Array.isArray(entry.plans) ? entry.plans : []);
      form.querySelector('textarea[name="exercise"]').value = entry.exercise || '';
      autoGrow(form.querySelector('textarea[name="exercise"]'));
      setPrompts(Array.isArray(entry.prompts) ? entry.prompts : ['', '', '']);
      statusEl.textContent = READ_ONLY
        ? `已加载 ${dateText} 的记录（只读）。`
        : `已加载 ${dateText} 的记录，可继续修改后提交。`;
    }

    function applyReadOnlyMode() {
      if (!READ_ONLY) return;
      const controls = [...form.querySelectorAll('input, textarea, button')];
      controls.forEach((el) => {
        if (el.classList.contains('calendar-day') || el.classList.contains('month-btn')) return;
        if (el.id === 'plan-add' || el.classList.contains('plan-del') || el.type === 'submit') {
          el.hidden = true;
        }
      });
      const inputs = [...form.querySelectorAll('.plan-text, textarea')];
      inputs.forEach((el) => {
        el.readOnly = true;
      });
      const checks = [...form.querySelectorAll('.plan-done')];
      checks.forEach((el) => {
        el.disabled = true;
      });
    }

    bindDeleteButtons();
    if (!READ_ONLY) {
      planAdd.addEventListener('click', () => {
        planList.appendChild(createPlanRow('', false));
        bindDeleteButtons();
      });
    }

    prevMonthBtn.addEventListener('click', () => {
      monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth() - 1, 1);
      renderCalendar();
    });

    nextMonthBtn.addEventListener('click', () => {
      monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth() + 1, 1);
      renderCalendar();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (READ_ONLY) {
        statusEl.textContent = '当前为只读模式，不能提交。';
        return;
      }
      statusEl.textContent = '提交中...';

      const plans = [];
      const rows = [...form.querySelectorAll('.plan-row')];
      rows.forEach((row) => {
        const text = row.querySelector('.plan-text').value || '';
        const done = row.querySelector('.plan-done').checked;
        plans.push({ text, done });
      });

      const prompts = [...form.querySelectorAll('textarea[name^="prompt_"]')].map((x) => x.value || '');
      const payload = {
        date: form.querySelector('input[name="date"]').value,
        exercise: form.querySelector('textarea[name="exercise"]').value || '',
        plans,
        prompts,
      };

      try {
        const submitUrl = `/submit?token=${encodeURIComponent(token)}`;
        const res = await fetch(submitUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '提交失败');

        recordedDates.add(payload.date);
        renderCalendar();
        statusEl.textContent = `已保存: ${data.path}`;
      } catch (err) {
        statusEl.textContent = `错误: ${err.message}`;
      }
    });

    (async () => {
      try {
        await fetchRecordedDates();
        renderCalendar();
        applyReadOnlyMode();
        selectedDateEl.textContent = selectedDate;
        await loadEntryForDate(selectedDate);
      } catch (err) {
        statusEl.textContent = `错误: ${err.message}`;
      }
    })();
  </script>
</body>
</html>
