<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>403 Forbidden</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #606060;
      --line: #d8d8d8;
      --btn: #2c2c2c;
      --btn-text: #f0f0f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(160deg, #fbfbfb 0%, #ececec 100%);
      color: var(--text);
      font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .card {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
    }
    h1 { margin: 0; font-size: 24px; text-align: center; }
  </style>
</head>
<body>
  <main class="card">
    <h1>403 Forbidden</h1>
  </main>
</body>
</html>
